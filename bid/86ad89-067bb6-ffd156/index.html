<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <base href="../../">
    <title>Pen Search Listing</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" type="module"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="search-header">
        <div>
          <p class="eyebrow">Pen Search</p>
          <h1>Listing Search</h1>
        </div>
        <form class="search-form" id="search-form" role="search">
          <label class="sr-only" for="search-input">Search listings</label>
          <input
            id="search-input"
            name="q"
            type="search"
            autocomplete="off"
            placeholder="Search pens"
            aria-label="Search listings"
          >
          <button type="submit">Search</button>
        </form>
      </header>

      <section id="app" class="result-surface" aria-live="polite"></section>
    </main>
  </body>
</html>
