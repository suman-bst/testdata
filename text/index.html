<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#FAFAFA">
    <meta property="og:title" content="Just Text it!">
    <meta property="og:description" content="Tap to open Messages.">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Just Text it!">
    <meta name="twitter:description" content="Tap to open Messages.">
    <title>Just Text it!</title>
    <meta http-equiv="refresh" content="0; url=sms:+16502137322">
    <style>
      :root {
        --bg: #FAFAFA;
        --surface: #FFFFFF;
        --text: #252734;
        --muted: #3C3F53;
        --accent: #714FEE;
        --accent-deep: #6D28D9;
        --border: #EBEBEF;
        --ring: rgba(113, 79, 238, 0.32);
        --shadow: rgba(18, 20, 20, 0.10);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        display: grid;
        margin: 0;
        min-height: 100vh;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, system-ui, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
        line-height: 1.45;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      main {
        display: grid;
        justify-items: center;
        width: min(100% - 32px, 420px);
        text-align: center;
      }

      .logo {
        display: block;
        height: auto;
        margin: 0 0 30px;
        max-width: min(250px, 72vw);
        width: 100%;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(2.5rem, 12vw, 4.25rem);
        font-weight: 860;
        line-height: 1.05;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 28px;
        color: var(--muted);
        font-size: 1.125rem;
      }

      a {
        align-items: center;
        background: linear-gradient(90deg, #9871FD 0%, #7751FE 100%);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 10px;
        box-shadow: 0 8px 20px -12px rgba(83, 47, 221, 0.7);
        color: #fff;
        display: inline-flex;
        font-size: 1.125rem;
        font-weight: 600;
        justify-content: center;
        line-height: 1.2;
        min-height: 54px;
        min-width: 190px;
        padding: 0 24px;
        text-decoration: none;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }

      a:hover {
        box-shadow: 0 10px 24px -12px rgba(83, 47, 221, 0.82);
        transform: translateY(-1px);
      }

      a:focus-visible {
        outline: 4px solid var(--ring);
        outline-offset: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <img class="logo" src="assets/airtap-logo.svg" alt="Airtap">
      <h1>Just Text it!</h1>
      <p>Opening iMessage</p>
      <a id="sms-link" href="sms:+16502137322">Hello Airtap!</a>
    </main>

    <script>
      (() => {
        const smsUrl = "sms:+16502137322";
        const link = document.getElementById("sms-link");

        link.href = smsUrl;
        window.addEventListener("load", () => {
          window.location.assign(smsUrl);
        });
      })();
    </script>
  </body>
</html>
